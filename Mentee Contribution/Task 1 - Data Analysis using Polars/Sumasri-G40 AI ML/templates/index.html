<!DOCTYPE html>
<html>
<head>
    <title>Biodiversity Hotspot Detection</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f7f9;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }

        h1 {
            color: #2e7d32;
            text-align: center;
        }

        form {
            text-align: center;
            margin-top: 20px;
        }

        input[type=file] {
            margin: 15px;
        }

        button {
            background-color: #2e7d32;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #1b5e20;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table, th, td {
            border: 1px solid #ccc;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        .success {
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌿 Biodiversity Hotspot Detection</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br>
        <button type="submit">Analyze Data</button>
    </form>

    {% if message %}
        <p class="success">{{ message }}</p>
    {% endif %}

    {% if tables %}
        <h2>Hotspot Results</h2>
        {{ tables|safe }}
    {% endif %}
</div>

</body>
</html>
